<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Softshot capture overlay</title>
  <desc id="desc">A dark desktop capture overlay with a selected region, annotation tools, and a compact toolbar.</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#17212f" />
      <stop offset="0.52" stop-color="#101216" />
      <stop offset="1" stop-color="#0d1117" />
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#252a31" />
      <stop offset="1" stop-color="#171a1f" />
    </linearGradient>
    <filter id="drop-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity="0.38" />
    </filter>
    <mask id="selection-mask">
      <rect width="1280" height="720" fill="#ffffff" />
      <rect x="160" y="150" width="640" height="360" fill="#000000" />
    </mask>
  </defs>

  <rect width="1280" height="720" fill="url(#background)" />
  <circle cx="1110" cy="120" r="210" fill="#38bdf8" opacity="0.08" />
  <circle cx="160" cy="610" r="260" fill="#22c55e" opacity="0.06" />

